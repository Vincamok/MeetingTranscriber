server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fichiers audio/vidéo peuvent être volumineux
    client_max_body_size 500M;

    # Docker embedded DNS — defer upstream resolution to request time
    resolver 127.0.0.11 valid=5s;
    set $backend_upstream http://backend:8000;

    location /api/ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Désactive le buffering pour les WebSockets
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Nécessaire pour les gros uploads (pas de buffering côté nginx)
        proxy_request_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

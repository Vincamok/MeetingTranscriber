services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

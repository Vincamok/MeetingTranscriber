services:

  # ── Backend CPU (profil par défaut) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: [cpu]
    restart: unless-stopped
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AI_DEFAULT_PROVIDER=${AI_DEFAULT_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - DATA_DIR=${DATA_DIR:-/data/minta}
    volumes:
      - minta_data:/data/minta
      - whisper_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Backend GPU ─────────────────────────────────────────────────────────────
  backend-gpu:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
    profiles: [gpu]
    restart: unless-stopped
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AI_DEFAULT_PROVIDER=${AI_DEFAULT_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - DATA_DIR=${DATA_DIR:-/data/minta}
    volumes:
      - minta_data:/data/minta
      - whisper_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Frontend ─────────────────────────────────────────────────────────────────
  # Profils cpu + gpu : le frontend démarre avec le backend actif.
  # depends_on liste les deux backends mais seul celui du profil actif existera.
  frontend-cpu:
    build: ./frontend
    profiles: [cpu]
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  frontend-gpu:
    build: ./frontend
    profiles: [gpu]
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend-gpu:
        condition: service_healthy

volumes:
  minta_data:
  whisper_cache:

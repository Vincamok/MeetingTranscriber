# Minta — build unitaire : backend GPU
# Registry : 192.168.200.45:3000  →  vincent/minta/backend-gpu:latest
kind: pipeline
spec:
  stages:
    - name: build_backend_gpu
      type: ci
      spec:
        cloneCodebase: true
        steps:
          - name: push_backend_gpu
            type: run
            spec:
              container: gcr.io/kaniko-project/executor:debug
              shell: Sh
              envs:
                REGISTRY_PASSWORD: ${{ secrets.get('harness_token') }}
                REGISTRY_USER: ${{ secrets.get('harness_user') }}
                REGISTRY_HOST: "192.168.200.45:3000"
                IMAGE_BASE: "vincent/minta"
              script: |-
                mkdir -p /root
                set -eu
                if [ -d /gitness ]; then cd /gitness; elif [ -d /harness ]; then cd /harness; fi
                echo "==> backend GPU"
                mkdir -p /kaniko/.docker
                echo "{\"auths\":{\"$REGISTRY_HOST\":{\"username\":\"$REGISTRY_USER\",\"password\":\"$REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
                /kaniko/executor --insecure --skip-tls-verify \
                  --context=dir://. --dockerfile=backend/Dockerfile.gpu \
                  --destination=$REGISTRY_HOST/$IMAGE_BASE/backend-gpu:latest
                echo "==> Terminé : $REGISTRY_HOST/$IMAGE_BASE/backend-gpu:latest"
